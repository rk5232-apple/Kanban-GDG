<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f2f4f8;
  --white: #ffffff;
  --text: #1a1d2e;
  --text2: #7b82a0;
  --text3: #b0b7d0;
  --border: #e8ebf4;
  --shadow: 0 4px 20px rgba(100,110,160,0.10);
  --shadow-md: 0 8px 32px rgba(100,110,160,0.14);
  --shadow-lg: 0 20px 60px rgba(100,110,160,0.18);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--white);
  padding: 0 32px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(100,110,160,0.07);
  position: sticky; top: 0; z-index: 100;
}

.logo {
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 21px;
  display: flex; align-items: center; gap: 10px;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(124,92,252,0.35);
}

.logo-icon svg { color: white; }

.header-center {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border-radius: 14px;
  padding: 8px 16px;
}

.header-center svg { color: var(--text3); flex-shrink: 0; }

#searchInput {
  background: none; border: none; color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; outline: none; width: 200px;
}
#searchInput::placeholder { color: var(--text3); }

.header-right { display: flex; gap: 10px; align-items: center; }

.hbtn {
  background: var(--bg); border: none; border-radius: var(--radius-xs);
  color: var(--text2); cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
  padding: 9px 16px;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.hbtn:hover { background: #e4e8f4; color: var(--text); }

.hbtn-primary {
  background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
  color: white;
  box-shadow: 0 4px 14px rgba(124,92,252,0.3);
}
.hbtn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(124,92,252,0.4);
  color: white;
  background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
}

/* ── Summary Cards ── */
.summary-row {
  display: flex; gap: 16px;
  padding: 24px 32px 0;
  overflow-x: auto;
}
.summary-row::-webkit-scrollbar { display: none; }

.sum-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 22px;
  min-width: 160px; flex: 1;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
  animation: slideUp 0.4s ease both;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: default;
}
.sum-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.sum-icon {
  width: 50px; height: 50px;
  border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.sum-count {
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 28px; line-height: 1;
  margin-bottom: 4px;
}
.sum-label {
  font-size: 11px; font-weight: 700;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
}

/* ── Progress Card ── */
.progress-section { padding: 18px 32px 0; }

.progress-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 22px 26px;
  box-shadow: var(--shadow);
  animation: slideUp 0.5s 0.1s ease both;
}

.prog-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px; gap: 12px;
}
.prog-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 16px;
}
.prog-subtitle { font-size: 12px; color: var(--text2); font-weight: 500; margin-top: 2px; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; }
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--text2);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.bar-chart {
  display: flex; align-items: flex-end; gap: 12px;
  height: 90px;
}
.bar-group {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  flex: 1;
}
.bar-pct {
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 12px; color: var(--text);
}
.bar-wrap {
  width: 100%; background: var(--bg); border-radius: 10px;
  height: 60px; display: flex; flex-direction: column; justify-content: flex-end;
  overflow: hidden;
}
.bar-fill {
  width: 100%; border-radius: 10px;
  transition: height 1.2s cubic-bezier(0.34,1.56,0.64,1);
}
.bar-label {
  font-size: 10px; font-weight: 700;
  color: var(--text2); text-transform: uppercase;
  letter-spacing: 0.3px; text-align: center;
}

/* ── Board ── */
.board-wrap {
  padding: 20px 32px 48px;
  display: flex; gap: 20px;
  overflow-x: auto; align-items: flex-start;
}
.board-wrap::-webkit-scrollbar { height: 6px; }
.board-wrap::-webkit-scrollbar-thumb { background: #d0d5e8; border-radius: 3px; }

/* ── Column ── */
.column {
  background: var(--white);
  border-radius: var(--radius);
  width: 308px; min-width: 308px;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
  animation: slideUp 0.4s ease both;
}
.column.drag-over {
  box-shadow: 0 0 0 2.5px var(--ca), var(--shadow-md);
}

.col-header {
  padding: 16px 16px 10px;
  display: flex; align-items: center; gap: 8px;
}
.col-badge {
  flex: 1; border-radius: 100px; padding: 7px 14px 7px 10px;
  display: flex; align-items: center; gap: 8px;
  background: var(--cl-bg);
}
.col-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--ca); flex-shrink: 0;
}
.col-title-input {
  font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 13px;
  color: var(--ca);
  background: none; border: none; outline: none;
  cursor: text; letter-spacing: 0.2px;
  width: 100%;
}
.col-count-badge {
  background: var(--ca); color: white;
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 12px;
  border-radius: 100px; padding: 3px 10px;
  min-width: 28px; text-align: center;
  flex-shrink: 0;
}
.col-menu-btn {
  background: var(--bg); border: none; border-radius: 10px;
  color: var(--text2); cursor: pointer;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.15s; flex-shrink: 0;
}
.col-header:hover .col-menu-btn { opacity: 1; }
.col-menu-btn:hover { background: #e4e8f4; color: var(--text); }

.col-prog-wrap { padding: 0 16px 14px; }
.col-prog-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 5px;
}
.col-prog-track {
  background: var(--bg); border-radius: 100px; height: 5px; overflow: hidden;
}
.col-prog-fill {
  height: 100%; border-radius: 100px;
  background: var(--ca);
  transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── Tasks ── */
.tasks-list {
  padding: 0 10px;
  display: flex; flex-direction: column; gap: 10px;
  overflow-y: auto; max-height: 440px;
}
.tasks-list::-webkit-scrollbar { width: 4px; }
.tasks-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.task-empty {
  padding: 28px 12px; text-align: center;
  color: var(--text3); font-size: 12px; font-weight: 600; line-height: 1.7;
}

.task-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px; cursor: grab;
  transition: all 0.2s;
  animation: cardIn 0.25s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to   { opacity: 1; transform: none; }
}
.task-card:hover {
  border-color: var(--ca, #7c5cfc);
  box-shadow: var(--shadow-md); transform: translateY(-2px);
}
.task-card.dragging { opacity: 0.3; cursor: grabbing; }

.task-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 8px; gap: 8px;
}
.priority-chip {
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.4px;
  padding: 3px 10px; border-radius: 100px; flex-shrink: 0;
}
.chip-high   { background: #ffe4e4; color: #f43f5e; }
.chip-medium { background: #fff3dc; color: #ff9f43; }
.chip-low    { background: #d4f7e8; color: #26d07c; }

.task-actions {
  display: flex; gap: 4px;
  opacity: 0; transition: opacity 0.15s;
}
.task-card:hover .task-actions { opacity: 1; }

.task-btn {
  background: var(--bg); border: none; border-radius: 8px;
  color: var(--text2); cursor: pointer; padding: 5px;
  display: flex; align-items: center; transition: all 0.15s;
}
.task-btn:hover { background: #e4e8f4; color: var(--text); }
.task-btn.del:hover { background: #ffe4e4; color: #f43f5e; }

.task-title { font-weight: 700; font-size: 14px; line-height: 1.4; margin-bottom: 5px; }
.task-desc  { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 12px; }
.task-footer {
  display: flex; align-items: center; justify-content: space-between;
}
.task-tag {
  background: var(--bg); border-radius: 8px; padding: 4px 10px;
  font-size: 11px; font-weight: 600; color: var(--text2);
}
.task-date {
  font-size: 11px; color: var(--text3); font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}

.add-task-btn {
  margin: 12px 10px;
  background: var(--cl-light, #f5f2ff);
  border: 2px dashed var(--ca, #7c5cfc);
  border-radius: var(--radius-sm);
  color: var(--ca, #7c5cfc);
  cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
  padding: 11px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s; opacity: 0.7;
}
.add-task-btn:hover { opacity: 1; background: var(--cl-bg, #eee9ff); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,29,46,0.45);
  backdrop-filter: blur(10px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
.modal-overlay.hidden { display: none; }

.modal {
  background: var(--white);
  border-radius: 24px; width: 100%; max-width: 460px;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.9) translateY(12px); }
  to   { opacity:1; transform: none; }
}

.modal-header {
  padding: 22px 22px 18px;
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; }
.modal-close {
  background: var(--bg); border: none; border-radius: 10px;
  color: var(--text2); cursor: pointer;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; line-height: 1; transition: all 0.15s;
}
.modal-close:hover { background: #ffe4e4; color: #f43f5e; }

.modal-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }

.form-label {
  font-size: 11px; font-weight: 800;
  color: var(--text2); text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 7px; display: block;
}
.form-input, .form-textarea, .form-select {
  background: var(--bg); border: 1.5px solid transparent;
  border-radius: var(--radius-xs);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  padding: 11px 14px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  width: 100%;
}
.form-textarea { resize: vertical; min-height: 85px; }
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: #7c5cfc; background: white;
  box-shadow: 0 0 0 3px rgba(124,92,252,0.10);
}
.form-select option { background: white; }

.modal-footer {
  padding: 18px 22px; border-top: 1.5px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}
.mbtn {
  border-radius: var(--radius-xs); cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
  padding: 10px 24px; border: none; transition: all 0.2s;
}
.mbtn-ghost { background: var(--bg); color: var(--text2); }
.mbtn-ghost:hover { background: #e4e8f4; color: var(--text); }
.mbtn-primary {
  background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
  color: white; box-shadow: 0 4px 14px rgba(124,92,252,0.3);
}
.mbtn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,92,252,0.42); }

/* ── Context Menu ── */
.ctx-menu {
  position: fixed; background: var(--white);
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px; min-width: 170px; z-index: 2000;
  box-shadow: var(--shadow-md); animation: fadeIn 0.15s ease;
}
.ctx-menu.hidden { display: none; }
.ctx-item {
  border-radius: 10px; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; font-weight: 600; padding: 9px 12px;
  transition: all 0.12s;
}
.ctx-item:hover { background: var(--bg); color: var(--text); }
.ctx-item.danger:hover { background: #ffe4e4; color: #f43f5e; }
.ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Dark Mode ── */
body.dark {
  --bg: #0f1117;
  --white: #1a1d2a;
  --text: #e8eaf6;
  --text2: #8b8faa;
  --text3: #555870;
  --border: #2a2d3e;
  --shadow: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.45);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.55);
}

body.dark header {
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

body.dark .sum-icon { filter: brightness(0.85); }
body.dark .task-card { background: #1e2130; }
body.dark .task-card:hover { background: #222536; }
body.dark .form-input,
body.dark .form-textarea,
body.dark .form-select { background: #0f1117; color: var(--text); }
body.dark .form-input:focus,
body.dark .form-textarea:focus,
body.dark .form-select:focus { background: #1a1d2a; }
body.dark .form-select option { background: #1a1d2a; }
body.dark .hbtn { background: #1e2130; color: var(--text2); }
body.dark .hbtn:hover { background: #252838; color: var(--text); }
body.dark .mbtn-ghost { background: #1e2130; color: var(--text2); }
body.dark .mbtn-ghost:hover { background: #252838; color: var(--text); }
body.dark .task-btn { background: #252838; }
body.dark .task-btn:hover { background: #2e3248; color: var(--text); }
body.dark .task-btn.del:hover { background: rgba(244,63,94,0.15); }
body.dark .task-tag { background: #252838; }
body.dark .col-menu-btn { background: #252838; }
body.dark .col-menu-btn:hover { background: #2e3248; }
body.dark .bar-wrap { background: #252838; }
body.dark .col-prog-track { background: #252838; }
body.dark .header-center { background: #1e2130; }
body.dark .ctx-menu { background: #1a1d2a; border-color: #2a2d3e; }
body.dark .ctx-item:hover { background: #252838; }
body.dark .ctx-item.danger:hover { background: rgba(244,63,94,0.12); }
body.dark .chip-high   { background: rgba(244,63,94,0.15);  color: #fb7185; }
body.dark .chip-medium { background: rgba(255,159,67,0.15); color: #fbbf24; }
body.dark .chip-low    { background: rgba(38,208,124,0.15); color: #34d399; }

/* Theme toggle button styles */
#themeBtn .icon-sun  { display: none; }
#themeBtn .icon-moon { display: block; }
body.dark #themeBtn .icon-sun  { display: block; }
body.dark #themeBtn .icon-moon { display: none; }

/* Always show actions on touch devices */
@media (hover: none) {
  .task-actions { opacity: 1 !important; }
  .col-menu-btn { opacity: 1 !important; }
  .move-btn { display: flex !important; }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  header { padding: 0 14px; height: 60px; }
  .header-center { display: none; }
  .logo { font-size: 18px; }
  .logo-icon { width: 30px; height: 30px; border-radius: 9px; }

  .summary-row {
    padding: 14px 14px 0;
    gap: 10px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
  }
  .sum-card {
    min-width: unset;
    padding: 14px 16px;
    border-radius: 16px;
    gap: 10px;
  }
  .sum-card:last-child { grid-column: 1 / -1; }
  .sum-icon { width: 40px; height: 40px; font-size: 18px; border-radius: 12px; }
  .sum-count { font-size: 22px; }
  .sum-label { font-size: 10px; }

  .progress-section { padding: 12px 14px 0; }
  .progress-card { padding: 16px; border-radius: 16px; }
  .prog-header { flex-direction: column; gap: 10px; }
  .bar-chart { height: 70px; gap: 8px; }

  .board-wrap {
    padding: 14px 14px 80px;
    gap: 14px;
    /* Horizontal scroll snap on mobile */
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .column {
    min-width: 280px;
    width: 280px;
    scroll-snap-align: start;
    max-height: none;
  }
  .tasks-list { max-height: none; }

  /* Floating add button on mobile */
  .fab {
    display: flex !important;
  }

  .hbtn span { display: none; }

  /* Modal full-screen on mobile */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal {
    border-radius: 24px 24px 0 0;
    max-width: 100%;
    width: 100%;
  }
}

@media (min-width: 769px) {
  .fab { display: none !important; }
  .move-btn { display: none; }
}

/* Floating Action Button */
.fab {
  display: none;
  position: fixed;
  bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
  border: none; border-radius: 18px; cursor: pointer;
  align-items: center; justify-content: center;
  box-shadow: 0 6px 24px rgba(124,92,252,0.45);
  z-index: 500;
  transition: transform 0.2s, box-shadow 0.2s;
}
.fab:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 30px rgba(124,92,252,0.55); }
.fab svg { color: white; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </div>
    Kanban
  </div>

  <div class="header-center">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search tasks…" oninput="filterTasks()">
  </div>

  <div class="header-right">
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="hbtn" onclick="addColumn()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Column
    </button>
    <button class="hbtn hbtn-primary" onclick="openModal(null,null)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Task
    </button>
  </div>
</header>

<div class="summary-row" id="summaryRow"></div>
<div class="progress-section" id="progressSection"></div>
<div class="board-wrap" id="board"></div>

<!-- Task Modal -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Task</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="form-label">Title *</label>
        <input class="form-input" id="taskTitle" placeholder="What needs to be done?">
      </div>
      <div>
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="taskDesc" placeholder="Add more details…"></textarea>
      </div>
      <div style="display:flex;gap:12px">
        <div style="flex:1">
          <label class="form-label">Priority</label>
          <select class="form-select" id="taskPriority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div style="flex:1">
          <label class="form-label">Column</label>
          <select class="form-select" id="taskColumn"></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="mbtn mbtn-ghost" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="ctx-menu hidden" id="ctxMenu"></div>

<!-- Mobile FAB -->
<button class="fab" onclick="openModal(null,null)" title="New Task">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const COL_STYLES = [
  { ca:'#7c5cfc', bg:'#eee9ff', light:'#f5f2ff' },
  { ca:'#ff9f43', bg:'#fff3dc', light:'#fff8ee' },
  { ca:'#26d07c', bg:'#d4f7e8', light:'#edfaf4' },
  { ca:'#3b82f6', bg:'#dbeafe', light:'#eff6ff' },
  { ca:'#ec4899', bg:'#fce7f3', light:'#fdf2f8' },
  { ca:'#f43f5e', bg:'#ffe4e8', light:'#fff1f3' },
];
const cs = i => COL_STYLES[i % COL_STYLES.length];

// ── State ──────────────────────────────────────────────────────────────────
let S = { columns:[], tasks:[], nCol:4, nTask:1 };
let editId=null, dragId=null, q='';

function load() {
  try { const x=localStorage.getItem('ktf2'); if(x){S=JSON.parse(x);return;} } catch(e){}
  S.columns=[{id:'c1',title:'Todo'},{id:'c2',title:'In Progress'},{id:'c3',title:'Done'}];
  S.tasks=[
    {id:'t1',colId:'c1',title:'Design landing page',desc:'Wireframes & hi-fi mockups for the homepage redesign.',priority:'high',at:Date.now()-172800000},
    {id:'t2',colId:'c1',title:'Set up CI/CD pipeline',desc:'GitHub Actions for testing and deployment.',priority:'medium',at:Date.now()-86400000},
    {id:'t3',colId:'c1',title:'Write unit tests',desc:'',priority:'low',at:Date.now()-3600000},
    {id:'t4',colId:'c2',title:'Implement auth system',desc:'JWT with refresh tokens & role-based access control.',priority:'high',at:Date.now()-259200000},
    {id:'t5',colId:'c2',title:'API rate limiting',desc:'Per-user middleware across all endpoints.',priority:'medium',at:Date.now()-86400000},
    {id:'t6',colId:'c3',title:'Database schema design',desc:'Migrated production schema successfully.',priority:'high',at:Date.now()-432000000},
    {id:'t7',colId:'c3',title:'Project repo setup',desc:'',priority:'low',at:Date.now()-604800000},
  ];
  S.nTask=8;
}

function save() { try{localStorage.setItem('ktf2',JSON.stringify(S));}catch(e){} }

// ── Render ─────────────────────────────────────────────────────────────────
function render() { renderSummary(); renderProgress(); renderBoard(); save(); }

function renderSummary() {
  let total=S.tasks.length, done=0, prog=0, high=0;
  S.tasks.forEach(t=>{
    const ci=S.columns.findIndex(c=>c.id===t.colId);
    if(ci===S.columns.length-1) done++;
    else if(ci>0) prog++;
    if(t.priority==='high') high++;
  });
  const todo=total-done-prog;
  const cards=[
    {e:'📋',n:total, l:'Total Tasks',    col:'#7c5cfc',bg:'#eee9ff'},
    {e:'📌',n:todo,  l:'To Do',          col:'#3b82f6',bg:'#dbeafe'},
    {e:'⚡',n:prog,  l:'In Progress',    col:'#ff9f43',bg:'#fff3dc'},
    {e:'✅',n:done,  l:'Completed',      col:'#26d07c',bg:'#d4f7e8'},
    {e:'🔥',n:high,  l:'High Priority',  col:'#f43f5e',bg:'#ffe4e8'},
  ];
  document.getElementById('summaryRow').innerHTML=cards.map((c,i)=>`
    <div class="sum-card" style="animation-delay:${i*0.06}s">
      <div class="sum-icon" style="background:${c.bg}">${c.e}</div>
      <div>
        <div class="sum-count" style="color:${c.col}">${c.n}</div>
        <div class="sum-label">${c.l}</div>
      </div>
    </div>`).join('');
}

function renderProgress() {
  const total=S.tasks.length||1;
  const bars=S.columns.map((col,i)=>{
    const n=S.tasks.filter(t=>t.colId===col.id).length;
    const pct=Math.round(n/total*100);
    return {label:col.title,n,pct,color:cs(i).ca};
  });
  const maxN=Math.max(...bars.map(b=>b.n),1);

  document.getElementById('progressSection').innerHTML=`
  <div class="progress-card">
    <div class="prog-header">
      <div>
        <div class="prog-title">Task Distribution</div>
        <div class="prog-subtitle">${S.tasks.length} tasks across ${S.columns.length} columns</div>
      </div>
      <div class="legend">
        ${bars.map(b=>`<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div>${escH(b.label)}</div>`).join('')}
      </div>
    </div>
    <div class="bar-chart">
      ${bars.map(b=>`
        <div class="bar-group">
          <div class="bar-pct">${b.pct}%</div>
          <div class="bar-wrap">
            <div class="bar-fill" style="height:${Math.round(b.n/maxN*100)}%;background:linear-gradient(180deg,${b.color}cc,${b.color});"></div>
          </div>
          <div class="bar-label">${escH(b.label.length>7?b.label.slice(0,7)+'…':b.label)}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderBoard() {
  const sq=q.toLowerCase();
  document.getElementById('board').innerHTML=S.columns.map((col,idx)=>{
    let tasks=S.tasks.filter(t=>t.colId===col.id);
    if(sq) tasks=tasks.filter(t=>t.title.toLowerCase().includes(sq)||(t.desc||'').toLowerCase().includes(sq));
    const s=cs(idx);
    const totalInCol=S.tasks.filter(t=>t.colId===col.id).length;
    const pct=S.tasks.length?Math.round(totalInCol/S.tasks.length*100):0;

    return `<div class="column" id="col-${col.id}"
      style="--ca:${s.ca};--cl-bg:${s.bg};--cl-light:${s.light}"
      ondragover="dov(event,'${col.id}')" ondrop="dop(event,'${col.id}')" ondragleave="dlv(event,'${col.id}')">
      <div class="col-header">
        <div class="col-badge">
          <div class="col-dot"></div>
          <input class="col-title-input" value="${escH(col.title)}"
            onblur="renCol('${col.id}',this.value)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </div>
        <div class="col-count-badge">${tasks.length}</div>
        <button class="col-menu-btn" onclick="showColCtx(event,'${col.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
      <div class="col-prog-wrap">
        <div class="col-prog-labels"><span>${totalInCol} tasks</span><span>${pct}%</span></div>
        <div class="col-prog-track"><div class="col-prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="tasks-list" id="tl-${col.id}">
        ${tasks.length===0&&!sq?'<div class="task-empty">✦ Drop tasks here<br>or add one below</div>':''}
        ${tasks.map(t=>renderTask(t,s.ca)).join('')}
      </div>
      <button class="add-task-btn" onclick="openModal(null,'${col.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>`;
  }).join('');
}

function renderTask(t, ca) {
  return `<div class="task-card" id="tk-${t.id}" draggable="true" style="--ca:${ca}"
    ondragstart="dstart(event,'${t.id}')" ondragend="dend()"
    ontouchstart="touchStart(event,'${t.id}')">
    <div class="task-top">
      <span class="priority-chip chip-${t.priority}">${t.priority}</span>
      <div class="task-actions">
        <button class="task-btn move-btn" onclick="moveTask('${t.id}')" title="Move task">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5,9 2,12 5,15"/><polyline points="9,5 12,2 15,5"/><polyline points="15,19 12,22 9,19"/><polyline points="19,9 22,12 19,15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
        </button>
        <button class="task-btn" onclick="openModal('${t.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="task-btn del" onclick="delTask('${t.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
    <div class="task-title">${escH(t.title)}</div>
    ${t.desc?`<div class="task-desc">${escH(t.desc)}</div>`:''}
    <div class="task-footer">
      <span class="task-tag">Design</span>
      <span class="task-date">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${fmtDate(t.at)}
      </span>
    </div>
  </div>`;
}

// ── Desktop Drag ───────────────────────────────────────────────────────────
function dstart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.getElementById('tk-'+id)?.classList.add('dragging'),0);}
function dend(){if(dragId)document.getElementById('tk-'+dragId)?.classList.remove('dragging');document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-over'));dragId=null;}
function dov(e,id){e.preventDefault();document.getElementById('col-'+id)?.classList.add('drag-over');}
function dlv(e,id){const c=document.getElementById('col-'+id);if(c&&!c.contains(e.relatedTarget))c.classList.remove('drag-over');}
function dop(e,id){e.preventDefault();document.getElementById('col-'+id)?.classList.remove('drag-over');const t=S.tasks.find(t=>t.id===dragId);if(t){t.colId=id;render();}}

// ── Touch Drag (Mobile) ────────────────────────────────────────────────────
let touchDragId=null, touchClone=null, lastOverCol=null;

function touchStart(e,id){
  touchDragId=id;
  const card=document.getElementById('tk-'+id);
  const rect=card.getBoundingClientRect();
  // Create floating clone
  touchClone=card.cloneNode(true);
  touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;
    opacity:0.92;pointer-events:none;z-index:9999;transform:scale(1.04) rotate(1.5deg);
    box-shadow:0 16px 40px rgba(0,0,0,0.25);transition:transform 0.1s;border-radius:14px;`;
  document.body.appendChild(touchClone);
  card.style.opacity='0.3';
  e.preventDefault();
}

function touchMove(e){
  if(!touchDragId||!touchClone) return;
  e.preventDefault();
  const t=e.touches[0];
  const rect=touchClone.getBoundingClientRect();
  touchClone.style.left=(t.clientX - rect.width/2)+'px';
  touchClone.style.top=(t.clientY - rect.height/2)+'px';
  // Find column under finger
  touchClone.style.display='none';
  const el=document.elementFromPoint(t.clientX,t.clientY);
  touchClone.style.display='';
  const colEl=el?.closest('.column');
  document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-over'));
  if(colEl){
    lastOverCol=colEl.id.replace('col-','');
    colEl.classList.add('drag-over');
  } else { lastOverCol=null; }
}

function touchEnd(e){
  if(!touchDragId) return;
  touchClone?.remove(); touchClone=null;
  const card=document.getElementById('tk-'+touchDragId);
  if(card) card.style.opacity='';
  document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-over'));
  if(lastOverCol){
    const task=S.tasks.find(t=>t.id===touchDragId);
    if(task&&task.colId!==lastOverCol){task.colId=lastOverCol;render();}
  }
  touchDragId=null; lastOverCol=null;
}

document.addEventListener('touchmove',touchMove,{passive:false});
document.addEventListener('touchend',touchEnd);

// ── Mobile: Move task via picker ──────────────────────────────────────────
function moveTask(taskId){
  const task=S.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const otherCols=S.columns.filter(c=>c.id!==task.colId);
  if(!otherCols.length) return;
  // Show a small bottom sheet
  const existing=document.getElementById('moveSheet');
  if(existing) existing.remove();
  const sheet=document.createElement('div');
  sheet.id='moveSheet';
  sheet.style.cssText=`position:fixed;bottom:0;left:0;right:0;background:var(--white);
    border-radius:20px 20px 0 0;padding:20px;z-index:3000;
    box-shadow:0 -8px 40px rgba(0,0,0,0.2);animation:sheetUp 0.25s ease;`;
  sheet.innerHTML=`
    <style>@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>
    <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;"></div>
    <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;margin-bottom:14px;color:var(--text)">Move to…</div>
    ${otherCols.map((c,i)=>`
      <div onclick="doMove('${taskId}','${c.id}')"
        style="padding:13px 16px;border-radius:12px;background:var(--bg);margin-bottom:8px;
          font-weight:600;font-size:14px;color:var(--text);cursor:pointer;
          display:flex;align-items:center;gap:10px;border:1.5px solid var(--border)">
        <div style="width:10px;height:10px;border-radius:50%;background:${cs(S.columns.findIndex(x=>x.id===c.id)).ca}"></div>
        ${escH(c.title)}
      </div>`).join('')}
    <button onclick="document.getElementById('moveSheet').remove()"
      style="width:100%;padding:13px;border:none;border-radius:12px;background:var(--border);
        color:var(--text2);font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px">
      Cancel
    </button>`;
  document.body.appendChild(sheet);
  // close on backdrop tap
  setTimeout(()=>document.addEventListener('click',function h(ev){if(!ev.target.closest('#moveSheet')){sheet.remove();document.removeEventListener('click',h);}},true),100);
}

function doMove(taskId,colId){
  const task=S.tasks.find(t=>t.id===taskId);
  if(task){task.colId=colId;render();}
  document.getElementById('moveSheet')?.remove();
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(taskId,colId){
  editId=taskId;
  const sel=document.getElementById('taskColumn');
  sel.innerHTML=S.columns.map(c=>`<option value="${c.id}">${escH(c.title)}</option>`).join('');
  if(taskId){
    const t=S.tasks.find(t=>t.id===taskId);
    document.getElementById('modalTitle').textContent='Edit Task';
    document.getElementById('taskTitle').value=t.title;
    document.getElementById('taskDesc').value=t.desc||'';
    document.getElementById('taskPriority').value=t.priority;
    sel.value=t.colId;
  } else {
    document.getElementById('modalTitle').textContent='New Task';
    document.getElementById('taskTitle').value='';
    document.getElementById('taskDesc').value='';
    document.getElementById('taskPriority').value='medium';
    sel.value=colId||S.columns[0]?.id;
  }
  document.getElementById('taskModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('taskTitle').focus(),80);
}

function closeModal(){document.getElementById('taskModal').classList.add('hidden');editId=null;}

function saveTask(){
  const title=document.getElementById('taskTitle').value.trim();
  if(!title){document.getElementById('taskTitle').focus();return;}
  const desc=document.getElementById('taskDesc').value.trim();
  const priority=document.getElementById('taskPriority').value;
  const colId=document.getElementById('taskColumn').value;
  if(editId){
    const t=S.tasks.find(t=>t.id===editId);
    Object.assign(t,{title,desc,priority,colId});
  } else {
    S.tasks.push({id:'t'+(S.nTask++),colId,title,desc,priority,at:Date.now()});
  }
  closeModal();render();
}

// ── Columns ────────────────────────────────────────────────────────────────
function addColumn(){S.columns.push({id:'c'+(S.nCol++),title:'New Column'});render();}
function renCol(id,val){const c=S.columns.find(c=>c.id===id);if(c){c.title=val.trim()||c.title;save();renderSummary();renderProgress();}}
function delCol(id){
  if(S.columns.length<=1)return;
  if(S.tasks.some(t=>t.colId===id)&&!confirm('Delete column and all its tasks?'))return;
  S.columns=S.columns.filter(c=>c.id!==id);
  S.tasks=S.tasks.filter(t=>t.colId!==id);
  render();
}
function delTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);render();}

// ── Context Menu ───────────────────────────────────────────────────────────
function showColCtx(e,id){
  e.stopPropagation();
  const m=document.getElementById('ctxMenu');
  m.innerHTML=`
    <div class="ctx-item" onclick="openModal(null,'${id}');hCtx()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add task
    </div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" onclick="delCol('${id}');hCtx()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Delete column
    </div>`;
  m.classList.remove('hidden');
  const r=e.currentTarget.getBoundingClientRect();
  m.style.left=Math.min(r.left,window.innerWidth-180)+'px';
  m.style.top=r.bottom+8+'px';
}
function hCtx(){document.getElementById('ctxMenu').classList.add('hidden');}

// ── Utils ──────────────────────────────────────────────────────────────────
function filterTasks(){q=document.getElementById('searchInput').value;renderBoard();}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('ktf_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

document.addEventListener('click',e=>{if(!e.target.closest('#ctxMenu')&&!e.target.closest('.col-menu-btn'))hCtx();});
document.getElementById('taskModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();hCtx();}});

load();
if(localStorage.getItem('ktf_theme')==='dark') document.body.classList.add('dark');
render();
</script>
</body>
</html>
